<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="icon" href="data:,">
    <link href="/static/bootstrap.min.css" rel="stylesheet">
    <script src="/static/jquery-3.2.1.slim.min.js"></script>
    <script src="/static/popper.min.js"></script>
    <script src="/static/bootstrap.min.js"></script>
    <link href="/static/orc.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/bootstrap-icons.css">

    <script>
        let version = "{{ version }}";
        function startProgress(seconds) {
            if (!seconds || seconds <= 2) return;
            const container = document.getElementById("orc-progress");
            const bar = document.getElementById("orc-progress-bar");
            container.style.display = "flex";
            bar.style.transition = "none";
            bar.style.width = "0%";
            void bar.offsetWidth;
            bar.style.transition = `width ${seconds}s linear`;
            bar.style.width = "100%";
            return container;
        }

        async function call(url, el, onFailure = () => {}) {
            el.disabled = true;
            const container = startProgress(parseFloat(el.dataset.duration || "0"));
            let response = null;

            try {
                response = await fetch(url, {headers: { "orc-version": version }});
                if (!response.ok) {
                    throw Error(`Response status: ${response.status}`);
                }
                version = (await response.json()).version;
                return true;
            } catch (error) {
                console.error(error.message);
                if (response && response.status >= 400 && response.status < 500) {
                    location.reload();
                }
                onFailure();
                return false;
            } finally {
                el.disabled = false;
                container.style.display = "none";
            }
        }

        if (window.matchMedia('(display-mode: standalone)').matches)
            window.resizeTo(400,670);

        async function checkVersion() {
            const spinner = document.getElementById("orc-version-spinner");
            const banner = document.getElementById("orc-version-error");
            spinner.style.display = "block";
            banner.style.display = "none";
            try {
                const response = await fetch("/api/version", { signal: AbortSignal.timeout(2000) });
                if (response.status >= 400 && response.status < 500) {
                    window.location.href = window.location.pathname + "?_=" + Date.now();
                    return;
                }
                const { version: serverVersion } = await response.json();
                if (serverVersion !== version)
                    location.reload();
            } catch {
                banner.style.display = "block";
            } finally {
                spinner.style.display = "none";
            }
        }

        if (!performance.getEntriesByType("navigation")[0]?.transferSize)
            window.addEventListener("load", checkVersion);
        window.addEventListener("pageshow", (e) => { if (e.persisted) checkVersion(); });
    </script>
  </head>
<body>
    <div id="orc-version-spinner" style="display: none; position: fixed; top: 10px; right: 10px; z-index: 1080;">
        <div class="spinner-border text-primary" role="status">
            <span class="sr-only">Loading...</span>
        </div>
    </div>
    <div id="orc-version-error" class="alert alert-danger m-0 rounded-0 text-center" style="display: none;" role="alert">
        Cannot reach server. Check you are on the local network.
    </div>
    <div id="orc-progress" class="progress orc-progress" style="display: none;" role="progressbar" aria-valuemin="0" aria-valuemax="100">
        <div id="orc-progress-bar" class="progress-bar" style="width: 0%;"></div>
    </div>
{% block page_body %}
    <div class="container vh-100">
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-2" role="navigation">
            <!-- Brand and toggle get grouped for better mobile display -->
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#admin-navbar-collapse"
                    aria-controls="admin-navbar-collapse" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <!-- navbar content -->
            <div class="collapse navbar-collapse" id="admin-navbar-collapse">
                <div class="navbar-brand">ORChestration</div>
                <ul class="nav navbar-nav mr-auto">
                  <li><a class="nav-link {% if request.url_rule.endpoint == "button.index" %}active{% endif %}" href="/">Remote</a></li>
                  <li><a class="nav-link {% if request.url_rule.endpoint == "button.schedule" %}active{% endif %}" href="/schedule/">Schedule</a></li>
                  <li><a class="nav-link {% if request.url_rule.endpoint == "button.cfg" %}active{% endif %}" href="/config/">Config</a></li>
                  <li><a class="nav-link {% if request.url_rule.endpoint == "button.log" %}active{% endif %}" href="/log/">Log</a></li>
                </ul>
                {% block menu_links %}
                {% endblock %}
            </div>
        </nav>
        {% block body %}{% endblock %}
    </div>
{% endblock %}
{% block tail %}
{% endblock %}
  </body>
</html>
